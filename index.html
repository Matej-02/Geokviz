<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoKviz</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }

    #map {
      height: 100vh;
      width: 100vw;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      z-index: 1000;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    button {
      margin-top: 5px;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="ui">
  <div id="task"><b>Loading...</b></div>
  <div>Napredek: <span id="count">0</span>/10</div>
  <div>Skupaj: <span id="total">0</span> km</div>
  <div>Best: <span id="best">–</span> km</div>
  <button onclick="confirmGuess()">Potrdi lokacijo</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="script.js"></script>

</body>
</html>
