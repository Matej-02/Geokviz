<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoKviz</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; width:100vw; }

#scoreBox {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  z-index:1000;
  font-size:14px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}
  
<div id="infoBox" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
     background:white; padding:15px; border-radius:8px; z-index:2000; box-shadow:0 0 15px rgba(0,0,0,0.5);">
  <div id="infoTitle" style="font-weight:bold; margin-bottom:5px;"></div>
  <div id="infoText" style="margin-bottom:10px;"></div>
  <button id="nextBtn">Naprej</button>
</div>
  
#task {
  font-weight:bold;
  margin-bottom:5px;
}

button {
  margin-top:5px;
  width:100%;
}
</style>
</head>

<body>
<div id="map"></div>

<div id="scoreBox">
  <div id="task">Loading...</div>
  <div>Napredek: <span id="count">0</span>/10</div>
  <div>Skupaj: <span id="total">0</span> km</div>
  <div>Best: <span id="best">–</span> km</div>
  <button id="confirmBtn">Potrdi lokacijo</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
