<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoKviz</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body { margin:0; font-family: sans-serif; }
#map { height:100vh; width:100vw; }

#scoreBox {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:8px;
  z-index:1000;
  font-size:14px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}
#task { font-weight:bold; margin-bottom:5px; }
button { margin-top:5px; width:100%; }

#filterBox, #infoModal {
  display:none;
  position: absolute;
  top:50%; left:50%;
  transform: translate(-50%, -50%);
  background:white;
  padding:20px;
  border-radius:8px;
  z-index:2000;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  width:300px;
}
#filterBox h3, #infoModal h3 { margin-top:0; }

#overlay {
  display: none;
  position: absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  z-index:1500; 
  background: rgba(0,0,0,0); 
}
</style>
</head>

<body>
<div id="map"></div>

<div id="overlay"></div>

<div id="scoreBox">
  <div id="task">Loading...</div>
  <div>Napredek: <span id="count">0</span>/<span id="rounds">10</span></div>
  <div>Skupaj: <span id="total">0</span> km</div>
  <div>Best: <span id="best">–</span> km</div>
  <button id="confirmBtn">Potrdi lokacijo</button>
  <button id="openFilterBtn">Izberi filtre / runde</button>
</div>

<!-- Filter Modal -->
<div id="filterBox">
  <h3>Filtriraj elemente</h3>
  <label>Država:</label><br>
  <select id="filterCountry"><option value="all">Vse države</option></select><br><br>
  <label>Vrsta:</label><br>
  <select id="filterType"><option value="all">Vse vrste</option></select><br><br>
  <label>Število rund:</label><br>
  <select id="filterRounds">
    <option value="10">10</option>
    <option value="20">20</option>
    <option value="30">30</option>
    <option value="50">50</option>
  </select><br><br>
  <button id="applyFilterBtn">Uporabi filtre</button>
  <button id="closeFilterBtn">Zapri</button>
</div>

<!-- Info Modal -->
<div id="infoModal">
  <h3 id="modalName"></h3>
  <p id="modalInfo"></p>
  <button id="nextBtn">Naprej</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script>
let map = L.map('map').setView([46,15],6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

let overlay = document.getElementById("overlay");

let features = [];
let filteredFeatures = [];
let currentFeature;
let roundCount = 0;
let totalDistance = 0;
let guessLatLng = null;
let guessMarker = null;
let currentLine = null;
let currentBufferLayer = null;
let correctLayer = null;
let roundsTotal = 10;

let bestScore = localStorage.getItem("bestScore");
if(bestScore) document.getElementById("best").textContent = bestScore;

// Naloži GeoJSON
fetch("locations.geojson")
  .then(r => r.json())
  .then(data => { 
    features = data.features; 
    populateFilters();
    filteredFeatures = features.slice(); // default vsi elementi
    startRound();
  })
  .catch(err=>{ alert("GeoJSON ni naložen"); console.error(err); });

// DOM elementi
const filterBox = document.getElementById("filterBox");
const infoModal = document.getElementById("infoModal");
const filterCountry = document.getElementById("filterCountry");
const filterType = document.getElementById("filterType");
const filterRounds = document.getElementById("filterRounds");

// Klik na karto
map.on("click", function(e){
  if(overlay.style.display === "block") return; // ne deluje če je modal
  guessLatLng = e.latlng;
  if(guessMarker) map.removeLayer(guessMarker);
  guessMarker = L.marker(e.latlng).addTo(map);
});

// Gumbi
document.getElementById("confirmBtn").addEventListener("click", confirmGuess);
document.getElementById("nextBtn").addEventListener("click", ()=>{ closeModal(); startRound(); });
document.getElementById("openFilterBtn").addEventListener("click", ()=>{ showFilterModal(); });
document.getElementById("closeFilterBtn").addEventListener("click", ()=>{ closeFilterModal(); });
document.getElementById("applyFilterBtn").addEventListener("click", applyFilters);

// Funkcije
function populateFilters(){
  let countries = new Set();
  let types = new Set();
  features.forEach(f=>{
    if(f.properties.drzava) f.properties.drzava.split(",").forEach(c=>countries.add(c.trim()));
    if(f.properties.vrsta) types.add(f.properties.vrsta);
  });
  countries.forEach(c=>{
    let opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    filterCountry.appendChild(opt);
  });
  types.forEach(t=>{
    let opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    filterType.appendChild(opt);
  });
}

function applyFilters(){
  let country = filterCountry.value;
  let type = filterType.value;
  roundsTotal = parseInt(filterRounds.value);
  document.getElementById("rounds").textContent = roundsTotal;

  filteredFeatures = features.filter(f=>{
    let countryMatch = (country==="all") || (f.properties.drzava && f.properties.drzava.includes(country));
    let typeMatch = (type==="all") || (f.properties.vrsta && f.properties.vrsta===type);
    return countryMatch && typeMatch;
  });

  roundCount=0; totalDistance=0;
  document.getElementById("count").textContent=0;
  document.getElementById("total").textContent=0;

  closeFilterModal();
  startRound();
}

function startRound(){
  if(roundCount>=roundsTotal) return endGame();
  guessLatLng=null;
  if(guessMarker){ map.removeLayer(guessMarker); guessMarker=null; }
  currentFeature = filteredFeatures[Math.floor(Math.random()*filteredFeatures.length)];
  document.getElementById("task").textContent = "Najdi: " + currentFeature.properties.name;
}

function confirmGuess(){
  if(!guessLatLng){ alert("Najprej klikni na zemljevid!"); return; }

  let userPoint = turf.point([guessLatLng.lng, guessLatLng.lat]);
  let geometry = currentFeature.geometry;
  let km = 0;
  let nearestCoords = null;
  let bufferLayer = null;

  if(geometry.type==="Polygon"){
    let poly = turf.polygon(geometry.coordinates);
    correctLayer = L.polygon(geometry.coordinates[0].map(c=>[c[1],c[0]]), {color:"green", fillColor:"green", fillOpacity:0.2}).addTo(map);

    if(turf.booleanPointInPolygon(userPoint, poly)){
      km = 0;
      nearestCoords = guessLatLng;
    } else {
      let nearest = turf.nearestPointOnLine(turf.polygonToLine(poly), userPoint, {units:"kilometers"});
      km = Math.round(nearest.properties.dist);
      nearestCoords = {lat: nearest.geometry.coordinates[1], lng: nearest.geometry.coordinates[0]};
    }

  } else if(geometry.type==="Point" || geometry.type==="LineString"){
    let geom;
    if(geometry.type==="Point") geom = turf.point(geometry.coordinates);
    else geom = turf.lineString(geometry.coordinates);

    let buffer = turf.buffer(geom, 50, {units:"kilometers"});
    let bufferCoords = buffer.geometry.coordinates[0].map(c => [c[1], c[0]]);
    bufferLayer = L.polygon(bufferCoords, {color:"green", fillColor:"green", fillOpacity:0.2}).addTo(map);

    if(geometry.type==="Point") correctLayer = L.marker(
      [geometry.coordinates[1], geometry.coordinates[0]], 
      {icon: L.icon({
          iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
          shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
          iconSize: [25, 41],
          iconAnchor: [12, 41],
          shadowSize: [41, 41],
          shadowAnchor: [12, 41]
      })}
    ).addTo(map);
    else correctLayer = L.polyline(geometry.coordinates.map(c=>[c[1],c[0]]), {color:"green"}).addTo(map);

    if(turf.booleanPointInPolygon(userPoint, buffer)){
      km = 0;
      if(geometry.type==="Point") nearestCoords = {lat: geometry.coordinates[1], lng: geometry.coordinates[0]};
      else {
        let nearest = turf.nearestPointOnLine(geom, userPoint, {units:"kilometers"});
        nearestCoords = {lat: nearest.geometry.coordinates[1], lng: nearest.geometry.coordinates[0]};
      }
    } else {
      let nearestOnBuffer = turf.nearestPointOnLine(turf.polygonToLine(buffer), userPoint, {units:"kilometers"});
      km = Math.round(nearestOnBuffer.properties.dist);
      nearestCoords = {lat: nearestOnBuffer.geometry.coordinates[1], lng: nearestOnBuffer.geometry.coordinates[0]};
    }
  }

  totalDistance += km;
  roundCount++;
  document.getElementById("count").textContent = roundCount;
  document.getElementById("total").textContent = totalDistance;

  if(guessLatLng && nearestCoords){
    currentLine = L.polyline([guessLatLng, nearestCoords], {color:"blue"}).addTo(map);
  }

  showModal(currentFeature, km);
  currentBufferLayer = bufferLayer;
}

function showModal(feature, km){
  document.getElementById("modalName").textContent = feature.properties.name;
  document.getElementById("modalInfo").textContent = (feature.properties.info || "Brez dodatnih informacij") + "\nZgrešil/a si: " + km + " km";
  infoModal.style.display = "block";
  overlay.style.display = "block";
}

function closeModal(){
  infoModal.style.display = "none";
  overlay.style.display = "none";
  if(currentLine){ map.removeLayer(currentLine); currentLine=null; }
  if(guessMarker){ map.removeLayer(guessMarker); guessMarker=null; }
  if(currentBufferLayer){ map.removeLayer(currentBufferLayer); currentBufferLayer=null; }
  if(correctLayer){ map.removeLayer(correctLayer); correctLayer=null; }
}

function showFilterModal(){
  filterBox.style.display = "block";
  overlay.style.display = "block";
}

function closeFilterModal(){
  filterBox.style.display = "none";
  overlay.style.display = "none";
}

function endGame(){
  alert("Konec! Skupaj: "+totalDistance+" km");
  if(!bestScore || totalDistance<bestScore){
    localStorage.setItem("bestScore", totalDistance);
    document.getElementById("best").textContent = totalDistance;
    alert("Nov rekord!");
  }
  if(confirm("Ponovi igro?")){
    roundCount=0; totalDistance=0;
    document.getElementById("count").textContent=0;
    document.getElementById("total").textContent=0;
    startRound();
  }
}
</script>
</body>
</html>
