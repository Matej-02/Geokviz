<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Geo Quiz Evropa</title>

  https://unpkg.com/leaflet/dist/leaflet.css

  <style>
    #map {
      height: 100vh;
      width: 100vw;
    }
    #scoreBox {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      font-size: 14px;
      z-index: 1000;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <div id="scoreBox">
    <b>Napredek:</b> <span id="count">0</span> / 10<br>
    <b>Skupna razdalja:</b> <span id="total">0</span> km<br>
    <b>Najboljši rezultat:</b> <span id="best">–</span> km
  </div>

  https://unpkg.com/leaflet/dist/leaflet.js</script>
  https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js</script>
  script.js</script>

</body>
</html>
